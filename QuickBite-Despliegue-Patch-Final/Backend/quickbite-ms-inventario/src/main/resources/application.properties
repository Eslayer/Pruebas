# Configuración de la Aplicación
spring.application.name=inventario
server.port=8082

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/quickbite_inventory?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuración Flyway
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false

# Configuración de Circuit Breaker
resilience4j.circuitbreaker.instances.inventoryService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.inventoryService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.inventoryService.sliding-window-size=10
resilience4j.circuitbreaker.instances.inventoryService.minimum-number-of-calls=5

# Configuración de Logging
logging.level.com.quickbite.inventario=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Endpoints de Gestión
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# External Services (Feign Clients)
services.menu-service.url=http://localhost:8083
services.notification-service.url=http://localhost:8087
