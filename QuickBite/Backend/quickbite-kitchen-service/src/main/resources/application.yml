server:
  port: 8086

spring:
  application:
    name: kitchen-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/quickbite_kitchen_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    
  cloud:
    circuitbreaker:
      resilience4j:
        instances:
          deliveryService:
            failureRateThreshold: 50
            waitDuration: 5s
            slidingWindowSize: 10
            minimumNumberOfCalls: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.quickbite.kitchen: DEBUG
    org.springframework.cloud.circuitbreaker: DEBUG
    io.github.resilience4j: DEBUG

# External services
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

delivery:
  service:
    url: http://localhost:8084/api/delivery
    timeout: 5s
