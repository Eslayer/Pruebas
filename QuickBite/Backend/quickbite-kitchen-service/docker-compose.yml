version: '3.8'

services:
  kitchen-service:
    build: .
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=kitchen_db
      - DB_USERNAME=kitchen_user
      - DB_PASSWORD=kitchen_password
    depends_on:
      - mysql
    networks:
      - quickbite-network

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=kitchen_db
      - MYSQL_USER=kitchen_user
      - MYSQL_PASSWORD=kitchen_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quickbite-network

volumes:
  mysql_data:

networks:
  quickbite-network:
    driver: bridge
